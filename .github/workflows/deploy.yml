name: Deploy Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_REWARD: ${{ secrets.VITE_BASE_REWARD }}
          VITE_BSC_REWARD: ${{ secrets.VITE_BSC_REWARD }}
          VITE_WALLETCONNECT_PROJECT_ID: ${{ secrets.VITE_WALLETCONNECT_PROJECT_ID }}
          VITE_XVGBASE_ROUTER_KIND: ${{ secrets.VITE_XVGBASE_ROUTER_KIND }}
          VITE_XVGBASE_CHAIN_ID: ${{ secrets.VITE_XVGBASE_CHAIN_ID }}
          VITE_XVGBASE_CHAIN_NAME: ${{ secrets.VITE_XVGBASE_CHAIN_NAME }}
          VITE_XVGBASE_PROJECT_NAME: ${{ secrets.VITE_XVGBASE_PROJECT_NAME }}
          VITE_XVGBASE_PROJECT_TICKER: ${{ secrets.VITE_XVGBASE_PROJECT_TICKER }}
          VITE_XVGBASE_TOKEN_SYMBOL: ${{ secrets.VITE_XVGBASE_TOKEN_SYMBOL }}
          VITE_XVGBASE_TOKEN_ADDRESS: ${{ secrets.VITE_XVGBASE_TOKEN_ADDRESS }}
          VITE_XVGBASE_QUOTE_TOKEN_SYMBOL: ${{ secrets.VITE_XVGBASE_QUOTE_TOKEN_SYMBOL }}
          VITE_XVGBASE_QUOTE_TOKEN_ADDRESS: ${{ secrets.VITE_XVGBASE_QUOTE_TOKEN_ADDRESS }}
          VITE_XVGBASE_QUOTE_TOKEN_DECIMALS: ${{ secrets.VITE_XVGBASE_QUOTE_TOKEN_DECIMALS }}
          VITE_XVGBASE_LP_SYMBOL: ${{ secrets.VITE_XVGBASE_LP_SYMBOL }}
          VITE_XVGBASE_REWARDS_CONTRACT_ADDRESS: ${{ secrets.VITE_XVGBASE_REWARDS_CONTRACT_ADDRESS }}
          VITE_XVGBASE_LP_TOKEN_ADDRESS: ${{ secrets.VITE_XVGBASE_LP_TOKEN_ADDRESS }}
          VITE_XVGBASE_V2_ROUTER_ADDRESS: ${{ secrets.VITE_XVGBASE_V2_ROUTER_ADDRESS }}
          VITE_XVGBASE_V2_POOL_ADDRESS: ${{ secrets.VITE_XVGBASE_V2_POOL_ADDRESS }}
          VITE_XVGBASE_POOL_STABLE: ${{ secrets.VITE_XVGBASE_POOL_STABLE }}
          VITE_XVGBASE_LIQUIDITY_SLIPPAGE_BPS: ${{ secrets.VITE_XVGBASE_LIQUIDITY_SLIPPAGE_BPS }}
          VITE_XVGBASE_LIQUIDITY_DEADLINE_MINUTES: ${{ secrets.VITE_XVGBASE_LIQUIDITY_DEADLINE_MINUTES }}
          VITE_XVGBASE_TOKEN_DECIMALS: ${{ secrets.VITE_XVGBASE_TOKEN_DECIMALS }}
          VITE_XVGBASE_LP_DECIMALS: ${{ secrets.VITE_XVGBASE_LP_DECIMALS }}
          VITE_XVGBSC_ROUTER_KIND: ${{ secrets.VITE_XVGBSC_ROUTER_KIND }}
          VITE_XVGBSC_CHAIN_ID: ${{ secrets.VITE_XVGBSC_CHAIN_ID }}
          VITE_XVGBSC_CHAIN_NAME: ${{ secrets.VITE_XVGBSC_CHAIN_NAME }}
          VITE_XVGBSC_PROJECT_NAME: ${{ secrets.VITE_XVGBSC_PROJECT_NAME }}
          VITE_XVGBSC_PROJECT_TICKER: ${{ secrets.VITE_XVGBSC_PROJECT_TICKER }}
          VITE_XVGBSC_TOKEN_SYMBOL: ${{ secrets.VITE_XVGBSC_TOKEN_SYMBOL }}
          VITE_XVGBSC_TOKEN_ADDRESS: ${{ secrets.VITE_XVGBSC_TOKEN_ADDRESS }}
          VITE_XVGBSC_QUOTE_TOKEN_SYMBOL: ${{ secrets.VITE_XVGBSC_QUOTE_TOKEN_SYMBOL }}
          VITE_XVGBSC_QUOTE_TOKEN_ADDRESS: ${{ secrets.VITE_XVGBSC_QUOTE_TOKEN_ADDRESS }}
          VITE_XVGBSC_QUOTE_TOKEN_DECIMALS: ${{ secrets.VITE_XVGBSC_QUOTE_TOKEN_DECIMALS }}
          VITE_XVGBSC_LP_SYMBOL: ${{ secrets.VITE_XVGBSC_LP_SYMBOL }}
          VITE_XVGBSC_REWARDS_CONTRACT_ADDRESS: ${{ secrets.VITE_XVGBSC_REWARDS_CONTRACT_ADDRESS }}
          VITE_XVGBSC_LP_TOKEN_ADDRESS: ${{ secrets.VITE_XVGBSC_LP_TOKEN_ADDRESS }}
          VITE_XVGBSC_V2_ROUTER_ADDRESS: ${{ secrets.VITE_XVGBSC_V2_ROUTER_ADDRESS }}
          VITE_XVGBSC_V2_POOL_ADDRESS: ${{ secrets.VITE_XVGBSC_V2_POOL_ADDRESS }}
          VITE_XVGBSC_POOL_STABLE: ${{ secrets.VITE_XVGBSC_POOL_STABLE }}
          VITE_XVGBSC_LIQUIDITY_SLIPPAGE_BPS: ${{ secrets.VITE_XVGBSC_LIQUIDITY_SLIPPAGE_BPS }}
          VITE_XVGBSC_LIQUIDITY_DEADLINE_MINUTES: ${{ secrets.VITE_XVGBSC_LIQUIDITY_DEADLINE_MINUTES }}
          VITE_XVGBSC_TOKEN_DECIMALS: ${{ secrets.VITE_XVGBSC_TOKEN_DECIMALS }}
          VITE_XVGBSC_LP_DECIMALS: ${{ secrets.VITE_XVGBSC_LP_DECIMALS }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
